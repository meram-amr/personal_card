<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div
        class="card bg-slate-100 w-96 h-96 shadow-lg rounded-lg m-auto my-20 relative hover:-translate-y-5 transition-all duration-800">
        <div class="bg-pink-300 w-96 h-28 rounded-t-lg "></div>
        <img src="img/image2.jpg"
            class=" w-44 h-44 top-10 mx-auto left-28 rounded-full shadow-md absolute hover:-translate-y-5 transition-all duration-500">
        <div class="grid grid-cols-1 mt-28 text-center font-bold">
            <span class="text-pink-500 text-2xl">Meram Amr Aboelsoud</span>
            <p class="text-sm">Frontend Developer</p>
        </div>
        <div class="flex text-2xl justify-center my-3 cursor-pointer">
            <i class="fa-brands fa-linkedin"></i>
            <i class="fa-brands fa-github"></i>
            <i class="fa-solid fa-envelope"></i>
        </div>
        <button
            class="bg-pink-400 py-2 px-5 rounded-full mx-36 cursor-pointer hover:bg-pink-500 transition-all duration-500 ">Message</button>
    </div>
</body>

</html>
